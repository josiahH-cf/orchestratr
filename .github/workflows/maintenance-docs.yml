name: "Maintenance — Docs Compliance"

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check README completeness
        id: readme
        run: |
          FINDINGS=""

          # Check required sections exist
          for section in "Features" "Platforms" "Quick Start" "Architecture" "Development" "License"; do
            if ! grep -qi "## $section" README.md; then
              FINDINGS="${FINDINGS}  - Missing section: ## ${section}\n"
            fi
          done

          # Check for placeholder text
          PLACEHOLDERS=$(grep -n '\[Choose\|TBD\|TODO\|PLACEHOLDER\|\[PROJECT-SPECIFIC\]' README.md || true)
          if [[ -n "$PLACEHOLDERS" ]]; then
            FINDINGS="${FINDINGS}  - Placeholder text found:\n$(echo "$PLACEHOLDERS" | sed 's/^/    /')\n"
          fi

          # Check CONTRIBUTING exists
          if [[ ! -f CONTRIBUTING.md ]]; then
            FINDINGS="${FINDINGS}  - CONTRIBUTING.md is missing\n"
          fi

          if [[ -n "$FINDINGS" ]]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            printf "%b" "$FINDINGS" > readme-findings.txt
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check constitution alignment
        id: constitution
        run: |
          FINDINGS=""

          if [[ ! -f .specify/constitution.md ]]; then
            FINDINGS="  - .specify/constitution.md is missing\n"
          else
            # Check that core capabilities from constitution are mentioned in README
            for capability in "hotkey" "app discovery" "web.*GUI\|management.*GUI" "system tray" "health polling\|ready_cmd" "diagnostic\|doctor"; do
              if ! grep -qiE "$capability" README.md; then
                FINDINGS="${FINDINGS}  - Constitution capability not reflected in README: ${capability}\n"
              fi
            done
          fi

          if [[ -n "$FINDINGS" ]]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            printf "%b" "$FINDINGS" > constitution-findings.txt
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check workflow lint
        id: workflow_lint
        run: |
          if [[ -x scripts/workflow-lint.sh ]]; then
            bash scripts/workflow-lint.sh > workflow-lint-output.txt 2>&1 || true
            if [[ -s workflow-lint-output.txt ]]; then
              echo "has_findings=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_findings=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on findings
        if: steps.readme.outputs.has_findings == 'true' || steps.constitution.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const labels = ['maintenance', 'automated'];
            const date = new Date().toISOString().split('T')[0];
            let body = `## Weekly Docs Compliance Report — ${date}\n\n`;

            if (fs.existsSync('readme-findings.txt')) {
              const readme = fs.readFileSync('readme-findings.txt', 'utf8');
              body += `### README Completeness\n\n${readme}\n`;
            }
            if (fs.existsSync('constitution-findings.txt')) {
              const constitution = fs.readFileSync('constitution-findings.txt', 'utf8');
              body += `### Constitution Alignment\n\n${constitution}\n`;
            }
            body += `\n---\n*Generated by maintenance-docs workflow. Mode: advisory (non-blocking).*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Maintenance] Docs compliance findings — ${date}`,
              body,
              labels,
            });
