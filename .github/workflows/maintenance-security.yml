name: "Maintenance — Security"

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go

      - name: Build
        run: make build

      - name: Perform CodeQL analysis
        id: codeql
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: vulncheck
        run: |
          govulncheck ./... > vulncheck-output.txt 2>&1 || true
          if grep -q "Vulnerability" vulncheck-output.txt; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on vulnerability findings
        if: steps.vulncheck.outputs.has_findings == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const labels = ['maintenance', 'automated', 'security'];
            const date = new Date().toISOString().split('T')[0];
            const vulns = fs.readFileSync('vulncheck-output.txt', 'utf8');
            const body = [
              `## Weekly Security Scan — ${date}`,
              '',
              '### govulncheck',
              '',
              '```',
              vulns,
              '```',
              '',
              '---',
              '*Generated by maintenance-security workflow. Mode: advisory (non-blocking).*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Vulnerability findings — ${date}`,
              body,
              labels,
            });
