name: "Maintenance — Lint"

on:
  schedule:
    - cron: "0 9 * * 1" # Weekly Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Run golangci-lint
        id: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --out-format json
        continue-on-error: true

      - name: Run go vet
        id: vet
        run: go vet ./... 2>&1 | tee vet-output.txt
        continue-on-error: true

      - name: Run gofmt check
        id: fmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [[ -n "$UNFORMATTED" ]]; then
            echo "unformatted=true" >> "$GITHUB_OUTPUT"
            echo "$UNFORMATTED" > fmt-output.txt
          else
            echo "unformatted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue on findings
        if: steps.lint.outcome == 'failure' || steps.vet.outcome == 'failure' || steps.fmt.outputs.unformatted == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const labels = ['maintenance', 'automated'];
            const date = new Date().toISOString().split('T')[0];
            let body = `## Weekly Lint Report — ${date}\n\n`;
            body += `Automated maintenance lint found issues.\n\n`;

            if ('${{ steps.lint.outcome }}' === 'failure') {
              body += `### golangci-lint\n\n❌ Failures detected. Run \`make lint\` locally for details.\n\n`;
            }
            if ('${{ steps.vet.outcome }}' === 'failure') {
              const fs = require('fs');
              const vet = fs.existsSync('vet-output.txt') ? fs.readFileSync('vet-output.txt', 'utf8') : 'See workflow logs';
              body += `### go vet\n\n\`\`\`\n${vet}\n\`\`\`\n\n`;
            }
            if ('${{ steps.fmt.outputs.unformatted }}' === 'true') {
              const fs = require('fs');
              const fmt = fs.existsSync('fmt-output.txt') ? fs.readFileSync('fmt-output.txt', 'utf8') : 'See workflow logs';
              body += `### gofmt\n\nUnformatted files:\n\`\`\`\n${fmt}\n\`\`\`\n\n`;
            }
            body += `---\n*Generated by maintenance-lint workflow. Mode: advisory (non-blocking).*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Maintenance] Lint findings — ${date}`,
              body,
              labels,
            });
